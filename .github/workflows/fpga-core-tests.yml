name: FPGA core tests on NUC

on:
  push:
    branches:
      - main
      - test-pipeline

  pull_request:
    branches:
      - main
      - test-pipeline

jobs:
  fpga-core-test:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull infra image
        run: |
          docker pull ghcr.io/pedropcventura/riscv-dev_tools:dev-amd64-final

      - name: Reset JTAG and run FPGA core tests
        run: |
          docker run --rm \
            --privileged \
            --device=/dev/bus/usb:/dev/bus/usb \
            -v "$PWD":/workspace \
            -w /workspace/tests/FPGA/core \
            ghcr.io/pedropcventura/riscv-dev_tools:dev-amd64-final \
            bash -lc "killall jtagd || true; jtagconfig; make AS=riscv32-unknown-elf-as LD=riscv32-unknown-elf-ld OBJCOPY=riscv32-unknown-elf-objcopy PATH=/opt/riscv32i/bin:\$PATH"

      - name: Fix permissions after docker
        if: always()
        run: |
          sudo chown -R $USER:$USER $PWD || true

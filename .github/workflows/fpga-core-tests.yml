name: FPGA core tests on NUC

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  fpga-core-test:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull infra image
        run: |
          docker pull ghcr.io/pedropcventura/riscv-dev_tools:dev-amd64-final

      - name: Reset JTAG and run FPGA core tests
        run: |
          docker run --rm \
            --privileged \
            --device=/dev/bus/usb:/dev/bus/usb \
            -v "$PWD":/workspace \
            -w /workspace/tests/FPGA/core \
            ghcr.io/pedropcventura/riscv-dev_tools:dev-amd64-final \
            bash -lc "killall jtagd || true; \
                      apt-get install -y -q gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf 2>/dev/null || true; \
                      jtagconfig; make"
